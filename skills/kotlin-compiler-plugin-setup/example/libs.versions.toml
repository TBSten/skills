[versions]
kotlin = "2.3.10"
ksp = "2.3.6"
autoService = "1.1.1"
autoServiceKsp = "1.2.0"
kctfork = "0.12.1"
kotest = "6.0.0.M2"

[libraries]
kotlinGradlePlugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
kotlinCompilerEmbeddable = { module = "org.jetbrains.kotlin:kotlin-compiler-embeddable", version.ref = "kotlin" }
autoServiceAnnotations = { module = "com.google.auto.service:auto-service-annotations", version.ref = "autoService" }
autoServiceKsp = { module = "dev.zacsweers.autoservice:auto-service-ksp", version.ref = "autoServiceKsp" }
kctforkCore = { module = "dev.zacsweers.kctfork:core", version.ref = "kctfork" }
kotestRunnerJunit5 = { module = "io.kotest:kotest-runner-junit5", version.ref = "kotest" }
kotestAssertionsCore = { module = "io.kotest:kotest-assertions-core", version.ref = "kotest" }

[plugins]
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
